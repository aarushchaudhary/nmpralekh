# nmpralekh/podman-compose.yml
version: '3.8'

services:
  db:
    image: docker.io/library/postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: nmpralekh
      POSTGRES_USER: mis_user
      POSTGRES_PASSWORD: NMPralekh
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: docker.io/library/redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./server
      dockerfile: backend.podman
    restart: always
    command: gunicorn config.wsgi:application -c gunicorn.conf.py --bind 0.0.0.0:8000
    env_file:
      - ./server/.env
    volumes:
      - ./server/backups:/app/backups  # Mount backups to host machine
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ./server
      dockerfile: backend.podman
    restart: always
    command: celery -A config worker --loglevel=info --concurrency=4
    env_file:
      - ./server/.env
    volumes:
      - ./server/backups:/app/backups
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./client
      dockerfile: frontend.podman
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: