# pgbouncer.example.ini
# Copy to /etc/pgbouncer/pgbouncer.ini on the server and fill in your values.
# After editing: sudo systemctl restart pgbouncer

[databases]
; Replace with your actual DB name, host, and port
nmpralekh = host=127.0.0.1 port=5432 dbname=nmpralekh

[pgbouncer]
; ── Network ──────────────────────────────────────────────────────────────────
listen_addr     = 127.0.0.1
listen_port     = 6432

; ── Pooling mode ─────────────────────────────────────────────────────────────
; Transaction mode is correct for Django — session-level features like
; SET LOCAL and advisory locks are not used in this project.
pool_mode       = transaction

; ── Pool sizing ──────────────────────────────────────────────────────────────
; max_client_conn: max simultaneous clients (they queue if pool is full)
; default_pool_size: max real Postgres connections per database+user combo
; Rule of thumb: keep default_pool_size <= Postgres max_connections - headroom
; Gunicorn: 9 workers × 2 threads = 18 → set pool to 20 (small buffer)
max_client_conn  = 200
default_pool_size = 20

; ── Timeouts (REQUIRED — fail fast rather than pile up) ──────────────────────
; Close idle server connections after 10 minutes
server_idle_timeout = 600

; Close idle client connections after 5 minutes
client_idle_timeout = 300

; Fail client with an error if no server connection becomes available
; within this many seconds (prevents request pile-up under load).
query_wait_timeout = 30

; ── Auth ─────────────────────────────────────────────────────────────────────
; Use SCRAM-SHA-256 — MD5 is deprecated in Postgres 14+ and brute-forceable.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; ── Misc ─────────────────────────────────────────────────────────────────────
; In transaction pooling mode server_reset_query is intentionally ignored
; by pgBouncer (documented behaviour). Kept here for reference only.
server_reset_query = DISCARD ALL

logfile  = /var/log/pgbouncer/pgbouncer.log
pidfile  = /var/run/pgbouncer/pgbouncer.pid
