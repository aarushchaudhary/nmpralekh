# redis.example.conf
# Append these lines to /etc/redis/redis.conf on the server.
# After editing: sudo systemctl restart redis
#
# ── Memory Management ────────────────────────────────────────────────────────
#
# Hard cap on Redis memory usage. Without this Redis will grow unbounded and
# eventually consume all available RAM, causing OOM kills.
# Tune to ~25% of your server RAM (e.g. 256 MB on a 1 GB VPS).
maxmemory 256mb

# Eviction policy when maxmemory is reached.
# allkeys-lru: evict the least-recently-used key from all keys.
# This is the correct policy for a cache workbook — stale dashboard counts
# and Celery result keys are evicted first, keeping hot data in memory.
maxmemory-policy allkeys-lru

# ── Persistence (optional, disable for pure cache usage) ─────────────────────
# If Redis is used ONLY as a cache (no Celery result persistence needed),
# disable RDB snapshots to reduce disk I/O:
# save ""
# appendonly no
